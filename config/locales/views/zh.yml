    terms:
      title: "服务条款"
      intro: "本服务条款（以下简称「本条款」）规定了獨立宣言（以下简称「本方」）在本网站上提供的服务（以下简称「本服务」）的使用条件。注册用户（以下简称「用户」）须按照本条款使用本服务。"
      article1_title: "第1条（适用范围）"
      article1_body: "本条款适用于用户与本方之间有关本服务使用的一切关系。"
      article2_title: "第2条（用户注册）"
      article2_body: "本服务的注册在申请者同意本条款并按本方规定的方式申请注册，且本方批准后即完成。<br>如本方判断申请者存在以下情况，可不批准注册申请，且不承担任何说明义务。"
      article2_items_html: "<li>注册申请中提供虚假信息</li><li>曾违反本条款的申请者</li><li>本方认为不宜注册的其他情况</li>"
      article3_title: "第3条（隐私政策）"
      article3_body: "本方将按照本方的「隐私政策」妥善处理通过本服务获取的个人信息。"
      article4_title: "第4条（禁止行为）"
      article4_body: "用户在使用本服务时不得进行以下行为。"
      article4_items_html: "<li>违反法律法规或公序良俗的行为</li><li>与犯罪活动相关的行为</li><li>破坏或妨碍本方、其他用户或第三方服务器或网络功能的行为</li><li>可能妨碍本方服务运营的行为</li><li>收集或积累其他用户个人信息的行为</li><li>非法访问或尝试非法访问的行为</li><li>冒充其他用户的行为</li><li>与本方服务相关，直接或间接向反社会势力提供利益的行为</li><li>侵犯本方、其他用户或第三方知识产权、肖像权、隐私权、名誉等权利或利益的行为</li><li>在本服务上发布或发送包含或被本方判断为包含以下表达的内容</li><li>过度暴力的表达</li><li>露骨的色情表达</li><li>基于种族、国籍、信仰、性别、社会地位、出身等的歧视性表达</li><li>诱导或助长自杀、自残、药物滥用的表达</li><li>其他包含反社会内容并使他人感到不快的表达</li><li>以以下为目的或被本方判断为以下目的的行为</li><li>以性行为或猥亵行为为目的的行为</li><li>以与陌生异性交往为目的的行为</li><li>以骚扰或诽谤中伤其他用户为目的的行为</li><li>以给本方、其他用户或第三方造成不利、损害或不快为目的的行为</li><li>以不同于本服务预期用途使用本服务的行为</li><li>宗教活动或对宗教团体的劝诱行为</li><li>本方认为不当的其他行为</li>"
      article5_title: "第5条（服务停止等）"
      article5_body: "如本方判断存在以下任何情况，可在不事先通知用户的情况下停止或中断本服务的全部或部分。"
      article5_items_html: "<li>对本服务相关计算机系统进行维护、检修或更新时</li><li>因地震、雷击、火灾、停电或天灾等不可抗力导致难以提供本服务时</li><li>因事故导致计算机或通信线路停止时</li><li>本方判断难以提供本服务的其他情况</li>"
      article5_body2: "对于因停止或中断本服务而给用户或第三方造成的任何不利或损害，本方概不负责。"
      article6_title: "第6条（著作权）"
      article6_body_html: "用户仅可就自己拥有著作权等必要知识产权或已获得必要权利人许可的文章、图片、视频等信息使用本服务进行发布或上传。<br>用户使用本服务发布或上传的文章、图片、视频等的著作权归属于该用户及其他现有权利人。但本方可在本服务的改良、质量提升、纠正不足以及宣传推广等必要范围内使用通过本服务发布或上传的文章、图片、视频等，用户不得就此使用行使著作人格权。<br>除前项规定外，本服务及与本服务相关的所有信息的著作权及其他知识产权均归属于本方或授权本方使用的权利人，未经许可，用户不得进行复制、转让、出借、翻译、修改、转载、公开传播（包括使其可传播）、传送、分发、出版、商业使用等。"
      article7_title: "第7条（使用限制及注销）"
      article7_body: "如用户存在以下任何情况，本方可在不事先通知的情况下删除发布数据，限制用户对本服务的全部或部分使用，或注销其用户身份。"
      article7_items_html: "<li>违反本条款任何条款的情况</li><li>发现注册信息存在虚假事实的情况</li><li>本方判断使用本服务不当的其他情况</li><li>对于本方依据本条所采取的行为给用户造成的损害，本方概不负责。</li>"
      article8_title: "第8条（免责声明）"
      article8_body_html: "本方不以明示或暗示的方式保证本服务不存在事实上或法律上的瑕疵（包括安全性、可靠性、准确性、完整性、有效性、特定用途适用性、安全性等方面的缺陷、错误或漏洞、权利侵害等）。<br>对于因本服务给用户造成的任何损害，本方概不负责。<br>对于用户与其他用户或第三方之间因本服务发生的交易、联络或纠纷等，本方概不负责。"
      article9_title: "第9条（服务内容变更等）"
      article9_body: "本方可在不通知用户的情况下变更本服务内容或停止提供本服务，对此给用户造成的损害概不负责。"
      article10_title: "第10条（条款变更）"
      article10_body: "本方在认为必要时，可在不通知用户的情况下随时变更本条款。在本条款变更后开始使用本服务的，视为该用户已同意变更后的条款。"
      article11_title: "第11条（通知与联系）"
      article11_body_html: "用户与本方之间的通知或联系按本方规定的方式进行。<br>除非用户按本方另行规定的方式提交变更通知，否则本方将视当前注册的联系方式为有效，向该联系方式发送通知或联系，这些通知或联系在发送时即视为已送达用户。"
      article12_title: "第12条（禁止转让权利义务）"
      article12_body: "未经本方书面事先同意，用户不得将使用合同上的地位或基于本条款的权利或义务转让给第三方或提供担保。"
      article13_title: "第13条（准据法及管辖）"
      article13_body_html: "本条款的解释以日本法为准据法。<br>如就本服务发生纠纷，以本方总部所在地的法院为专属合意管辖法院。"
      closing: "以上"
      enacted_date: "2022年05月19日 制定"
    privacy_policy:
      title: "隐私政策"
      intro: "獨立宣言（以下简称「本方」）就本网站上提供的服务（以下简称「本服务」）中用户个人信息的处理，制定以下隐私政策（以下简称「本政策」）。"
      article1_title: "第1条（个人信息）"
      article1_body: "「个人信息」是指《个人信息保护法》所定义的「个人信息」，即有关在世个人的信息，通过该信息中包含的姓名、出生日期、地址、电话号码、联系方式及其他描述等可以识别特定个人的信息，以及与容貌、指纹、声纹相关的数据，以及健康保险证的保险者编号等可以从该信息单独识别特定个人的信息（个人识别信息）。"
      article2_title: "第2条（获取的信息）"
      article2_body: "本方从客户处获取以下信息。"
      article2_items_html: "<li>姓名（包括昵称和笔名）</li><li>年龄或出生日期</li><li>客户使用的操作系统和终端相关信息，如操作系统生成的ID、终端类型、终端识别码等</li><li>客户在本方网站上的行为记录，如在本方网站的停留时间、输入记录等</li><li>本方应用程序的使用记录，如应用启动时间、输入记录等</li>"
      article3_title: "第3条（收集和使用个人信息的目的）"
      article3_body: "本方将从客户处获取的信息用于以下目的。"
      article3_items_html: "<li>用于本方服务相关的注册受理、客户身份验证和认证</li><li>用于管理客户对本方服务的使用记录</li><li>用于分析客户在本方服务中的行为记录，以维护和改善本方服务</li><li>用于市场分析和营销</li><li>用于广告的发布、展示和效果测量</li><li>用于提供有关本方服务的信息</li><li>用于应对违反本方条款或法令的行为</li><li>用于提供、维护、保护和改善本方服务</li>"
      article4_title: "第4条（使用目的的变更）"
      article4_body_html: "本方仅在合理认定使用目的与变更前具有相关性的情况下，才变更个人信息的使用目的。<br>如变更使用目的，应按本方规定的方式通知用户变更后的目的，或在本网站上公布。"
      article5_title: "第5条（向第三方提供个人信息）"
      article5_body_html: "对于从客户处获取的信息中属于个人数据（《个人信息保护法》第2条第6款）的部分，本方不会在未事先征得客户同意的情况下向第三方（包括日本境外的人员）提供。<br>但以下情况除外。"
      article5_items_html: "<li>本方或本方服务被收购的情况</li><li>与业务合作伙伴共同使用的情况（如有具体的共同使用，将另行公布其内容）</li><li>法律允许合法向第三方提供的其他情况</li><li>本方在达成使用目的所必要的范围内委托全部或部分个人信息处理的情况</li><li>因合并或其他原因导致业务继承而提供个人信息的情况</li>"
      article6_title: "第6条（个人信息的使用停止等）"
      article6_body_html: "如当事人以个人信息被超出使用目的范围处理或以不正当手段获取为由，要求停止使用或删除（以下简称「使用停止等」），本方将立即进行必要的调查。<br>根据上述调查结果，如判断需要回应该请求，将立即对该个人信息进行使用停止等处理。<br>如本方根据上述规定进行使用停止等处理，或决定不进行使用停止等处理，将立即通知用户。<br>尽管有上述两项规定，如使用停止等需要大量费用或难以实施，且可以采取保护用户权益所必要的替代措施，则采取该替代措施。"
      article7_title: "第7条 访问分析工具"
      article7_body_html: "本方使用「Google Analytics」进行客户访问分析。Google Analytics使用Cookie收集流量数据。<br>流量数据以匿名方式收集，不会识别个人身份。<br>您可以通过禁用Cookie来拒绝收集这些信息。<br>详情请查看您的浏览器设置。"
      article8_title: "第8条（隐私政策的变更）"
      article8_body_html: "除法令或本政策另有规定的事项外，本政策的内容可以在不通知用户的情况下进行变更。<br>除本方另有规定外，变更后的隐私政策自在本网站上公布时生效。"
      article9_title: "第9条（免责声明）"
      article9_body_html: "关于本服务的内容和信息，我们尽力提供尽可能准确的信息，但不保证其准确性或安全性。信息可能已过时。<br>对于因本服务上发布的内容而产生的损害等，我们概不负责，敬请谅解。"
      article10_title: "第10条（咨询窗口）"
      article10_body: "如对本政策有疑问，请联系管理者Twitter账号(@eityamo)。"
      closing: "以上"
      enacted_date: "2022年05月19日 制定"
