      intro: "These Terms of Service (hereinafter referred to as \"these Terms\") set forth the conditions of use for the services (hereinafter referred to as \"the Service\") provided on this website by LITTLE REBELLION (hereinafter referred to as \"the Operator\"). All registered users (hereinafter referred to as \"Users\") shall use the Service in accordance with these Terms."
