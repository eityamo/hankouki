    terms:
      title: "Terms of Service"
      intro: "These Terms of Service (hereinafter referred to as \"these Terms\") set forth the conditions of use for the services (hereinafter referred to as \"the Service\") provided on this website by LITTLE REBELLION (hereinafter referred to as \"the Operator\"). All registered users (hereinafter referred to as \"Users\") shall use the Service in accordance with these Terms."
      article1_title: "Article 1 (Application)"
      article1_body: "These Terms shall apply to all relationships between Users and the Operator regarding the use of the Service."
      article2_title: "Article 2 (Registration)"
      article2_body: "Registration for the Service shall be completed when a prospective user agrees to these Terms, applies for registration in a manner prescribed by the Operator, and the Operator approves the application.<br>The Operator may decline to approve an application for registration if the applicant is found to have any of the following reasons, and shall bear no obligation to disclose the reasons."
      article2_items_html: "<li>If false information was provided in the registration application</li><li>If the application is from a person who has violated these Terms</li><li>If the Operator otherwise deems the registration inappropriate</li>"
      article3_title: "Article 3 (Privacy Policy)"
      article3_body: "The Operator shall handle personal information obtained through the use of the Service appropriately in accordance with the Operator's Privacy Policy."
      article4_title: "Article 4 (Prohibited Actions)"
      article4_body: "Users shall not engage in any of the following actions when using the Service."
      article4_items_html: "<li>Actions that violate laws or public order and morals</li><li>Actions related to criminal activity</li><li>Actions that destroy or interfere with the functionality of the Operator's, other Users', or third parties' servers or networks</li><li>Actions that may interfere with the operation of the Operator's services</li><li>Actions to collect or accumulate personal information of other Users</li><li>Unauthorized access or attempts thereof</li><li>Impersonating other Users</li><li>Actions that directly or indirectly provide benefits to antisocial forces in connection with the Operator's services</li><li>Actions that infringe upon intellectual property rights, portrait rights, privacy, honor, or other rights or interests of the Operator, other Users, or third parties</li><li>Posting or transmitting content that contains or is judged by the Operator to contain the following expressions</li><li>Excessively violent expressions</li><li>Explicit sexual expressions</li><li>Expressions that lead to discrimination based on race, nationality, creed, gender, social status, family origin, etc.</li><li>Expressions that induce or promote suicide, self-harm, or drug abuse</li><li>Other antisocial content that causes discomfort to others</li><li>Actions for or judged by the Operator to be for the following purposes</li><li>Actions for the purpose of sexual or obscene acts</li><li>Actions for the purpose of meeting or dating strangers of the opposite sex</li><li>Actions for the purpose of harassment or defamation of other Users</li><li>Actions for the purpose of causing disadvantage, damage, or discomfort to the Operator, other Users, or third parties</li><li>Actions that use the Service for purposes different from its intended use</li><li>Religious activities or solicitation for religious organizations</li><li>Other actions deemed inappropriate by the Operator</li>"
      article5_title: "Article 5 (Suspension of Service)"
      article5_body: "The Operator may suspend or interrupt all or part of the Service without prior notice to Users if it determines that any of the following reasons exist."
      article5_items_html: "<li>When performing maintenance, inspection, or updates on the computer systems related to the Service</li><li>When the provision of the Service becomes difficult due to force majeure such as earthquakes, lightning, fire, power outages, or natural disasters</li><li>When computers or communication lines are stopped due to an accident</li><li>When the Operator otherwise determines that the provision of the Service is difficult</li>"
      article5_body2: "The Operator shall not be liable for any disadvantage or damage suffered by Users or third parties due to the suspension or interruption of the Service."
      article6_title: "Article 6 (Copyright)"
      article6_body_html: "Users may use the Service to post or upload only text, images, videos, and other information for which they hold the necessary intellectual property rights, including copyright, or for which they have obtained permission from the necessary rights holders.<br>Copyright of text, images, videos, etc. posted or uploaded by Users using the Service shall be retained by the respective Users and other existing rights holders. However, the Operator may use text, images, videos, etc. posted or uploaded using the Service to the extent necessary for the improvement, quality enhancement, or correction of deficiencies of the Service, as well as for publicity and promotion of the Service, and Users shall not exercise their moral rights in relation to such use.<br>Except as provided in the preceding paragraph, all copyrights and other intellectual property rights in the Service and all information related to the Service belong to the Operator or the rights holders who have licensed their use to the Operator, and Users shall not reproduce, transfer, lend, translate, modify, reprint, publicly transmit (including making transmittable), transmit, distribute, publish, or use for business purposes without permission."
      article7_title: "Article 7 (Usage Restrictions and Deregistration)"
      article7_body: "The Operator may, without prior notice, delete posted data, restrict all or part of the use of the Service, or cancel registration as a User if the User falls under any of the following."
      article7_items_html: "<li>If any provision of these Terms has been violated</li><li>If it is found that there are false facts in the registered information</li><li>If the Operator otherwise determines that use of the Service is not appropriate</li><li>The Operator shall not be liable for any damage caused to Users by actions taken by the Operator based on this article.</li>"
      article8_title: "Article 8 (Disclaimer of Warranties)"
      article8_body_html: "The Operator does not expressly or implicitly warrant that the Service is free from defects in fact or law (including defects related to safety, reliability, accuracy, completeness, effectiveness, fitness for a particular purpose, security, errors, bugs, rights infringement, etc.).<br>The Operator shall not be liable for any damage arising from the Service to Users.<br>The Operator shall not be liable for any transactions, communications, or disputes between Users and other Users or third parties in connection with the Service."
      article9_title: "Article 9 (Changes to Service Content)"
      article9_body: "The Operator may change the content of or discontinue the Service without notice to Users, and shall not be liable for any damage caused to Users thereby."
      article10_title: "Article 10 (Changes to Terms of Service)"
      article10_body: "The Operator may change these Terms at any time without notice to Users if deemed necessary. If a User begins using the Service after the change of these Terms, the User shall be deemed to have agreed to the changed Terms."
      article11_title: "Article 11 (Notices and Communications)"
      article11_body_html: "Notices or communications between Users and the Operator shall be made by means determined by the Operator.<br>Unless a User submits a change notification in a format separately prescribed by the Operator, the Operator shall deem the currently registered contact information to be valid, send notices or communications to that contact, and such notices or communications shall be deemed to have reached the User at the time of dispatch."
      article12_title: "Article 12 (Prohibition of Transfer of Rights and Obligations)"
      article12_body: "Users may not transfer their position under the use agreement or any rights or obligations under these Terms to a third party, or provide them as security, without the prior written consent of the Operator."
      article13_title: "Article 13 (Governing Law and Jurisdiction)"
      article13_body_html: "Japanese law shall be the governing law for the interpretation of these Terms.<br>In the event of any dispute regarding the Service, the court having jurisdiction over the location of the Operator's head office shall have exclusive agreed jurisdiction."
      closing: "End"
      enacted_date: "Enacted on May 19, 2022"
    privacy_policy:
      title: "Privacy Policy"
      intro: "LITTLE REBELLION (hereinafter referred to as \"the Operator\") establishes the following Privacy Policy (hereinafter referred to as \"this Policy\") regarding the handling of Users' personal information in the services (hereinafter referred to as \"the Service\") provided on this website."
      article1_title: "Article 1 (Personal Information)"
      article1_body: "\"Personal information\" refers to \"personal information\" as defined in the Act on the Protection of Personal Information, meaning information about a living individual that can identify the specific individual by name, date of birth, address, telephone number, contact information, or other descriptions contained in such information, as well as data related to appearance, fingerprints, and voiceprints, and information that can identify a specific individual from such information alone, such as the insurer number on a health insurance card (personal identification information)."
      article2_title: "Article 2 (Information We Collect)"
      article2_body: "We collect the following information from customers."
      article2_items_html: "<li>Name (including nicknames and pen names)</li><li>Age or date of birth</li><li>Information about the customer's OS and device, such as OS-generated IDs, device types, and device identifiers</li><li>Customer behavior history on our website, such as time spent on our website and input history</li><li>Usage history of our application, such as application launch time and input history</li>"
      article3_title: "Article 3 (Purpose of Collecting and Using Personal Information)"
      article3_body: "We use the information collected from customers for the following purposes."
      article3_items_html: "<li>For registration acceptance, identity verification, and authentication related to our services</li><li>For managing the customer's usage history of our services</li><li>For analyzing customer behavior in our services and utilizing it for maintenance and improvement</li><li>For market analysis and marketing</li><li>For delivery, display, and measurement of advertising effectiveness</li><li>For providing information about our services</li><li>For responding to actions that violate our terms or laws</li><li>For providing, maintaining, protecting, and improving our services</li>"
      article4_title: "Article 4 (Change of Purpose of Use)"
      article4_body_html: "The Operator shall change the purpose of use of personal information only to the extent reasonably recognized as being related to the purpose before the change.<br>If the purpose of use is changed, the changed purpose shall be notified to Users by means prescribed by the Operator or announced on this website."
      article5_title: "Article 5 (Third-Party Disclosure of Personal Information)"
      article5_body_html: "The Operator will not provide personal data (as defined in Article 2, Paragraph 6 of the Act on the Protection of Personal Information) among the information collected from customers to third parties (including those outside Japan) without obtaining the customer's prior consent.<br>However, the following cases are excluded."
      article5_items_html: "<li>When the Operator or our services are acquired</li><li>When jointly used with business partners (specific details of any joint use will be separately announced)</li><li>Other cases where third-party provision is legally permitted</li><li>When the Operator delegates all or part of the handling of personal information within the scope necessary to achieve the purpose of use</li><li>When personal information is provided in connection with business succession due to merger or other reasons</li>"
      article6_title: "Article 6 (Suspension of Use of Personal Information)"
      article6_body_html: "If an individual requests the suspension or deletion of use of their personal information (hereinafter referred to as \"suspension of use\") on the grounds that the personal information is being handled beyond the scope of the purpose of use or was obtained by improper means, the Operator shall promptly conduct the necessary investigation.<br>If it is determined that the request should be complied with based on the results of the investigation, the Operator shall promptly suspend the use of such personal information.<br>If the Operator suspends the use based on the provisions of the preceding paragraph, or decides not to suspend use, it shall promptly notify the User.<br>Notwithstanding the preceding two paragraphs, if suspension of use would require significant costs or is otherwise difficult, and alternative measures necessary to protect the rights and interests of the User can be taken, such alternative measures shall be adopted."
      article7_title: "Article 7 (Analytics Tools)"
      article7_body_html: "The Operator uses Google Analytics for analyzing customer access. Google Analytics uses cookies for collecting traffic data.<br>Traffic data is collected anonymously and does not identify individuals.<br>You can refuse the collection of this information by disabling cookies.<br>Please check your browser settings for details."
      article8_title: "Article 8 (Changes to Privacy Policy)"
      article8_body_html: "The contents of this Policy may be changed without notice to Users, except for matters otherwise provided by law or in this Policy.<br>Unless otherwise specified by the Operator, the changed Privacy Policy shall take effect when posted on this website."
      article9_title: "Article 9 (Disclaimer)"
      article9_body_html: "While we strive to provide as accurate information as possible regarding the content and information of the Service, we do not guarantee its accuracy or safety. Information may become outdated.<br>Please note that we cannot accept any responsibility for damages arising from the content posted on the Service."
      article10_title: "Article 10 (Contact)"
      article10_body: "For inquiries regarding this Policy, please contact the administrator's Twitter account (@eityamo)."
      closing: "End"
      enacted_date: "Enacted on May 19, 2022"
